hunts:
  - name: monitor_test_enabled
    source: craigslist
    city: houston
    query: monitor
    limit: 5
    enabled: true
    rules:
      max_price: 50
      include_keywords:
        - monitor
      exclude_keywords:
        - broken
        - parts only

  - name: monitor_test_disabled
    source: craigslist
    city: houston
    query: monitor
    limit: 5
    enabled: false

  - name: monitor_test_no_flag
    source: craigslist
    city: houston
    query: monitor
    limit: 5