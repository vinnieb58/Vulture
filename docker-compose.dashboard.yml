# Nest v1 Dashboard — tablet-first household/Raven observability container.
# Does not run the Vulture bot or scheduler; mounts host data/logs read-only.
#
# Storage: bind-mount only the stable /mnt/storage parent (not individual optional
# drive paths). Unplugged USB/HDD mountpoints must not prevent container startup.
# Health: /health endpoint used by Docker HEALTHCHECK (curl -sf http://localhost:8088/health).
#
# Glances provides live host telemetry for the Raven Health card. It is bound to
# localhost on the host (127.0.0.1:61208) and reachable from the dashboard on the
# internal compose network only — not exposed publicly.

services:
  glances:
    image: nicolargo/glances:ubuntu-latest-full
    container_name: raven-glances
    pid: host
    command: glances -w --bind 0.0.0.0 --port 61208
    ports:
      - "127.0.0.1:61208:61208"
    volumes:
      - /proc:/proc:ro
      - /sys:/sys:ro
      - /dev:/dev:ro
      - /run/udev:/run/udev:ro
      # Host root for filesystem stats (/api/4/fs). Without this, Glances sees
      # container mount namespace only and /mnt/storage paths may be missing.
      - /:/rootfs:ro
    networks:
      - dashboard-internal
    restart: unless-stopped

  vulture-dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
      args:
        BUILD_GIT_COMMIT: ${BUILD_GIT_COMMIT:-unknown}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-unknown}
    ports:
      - "8088:8088"
    pid: host
    depends_on:
      - glances
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs:ro
      - /:/host/root:ro
      - /proc:/host/proc:ro
      - /etc/hostname:/etc/hostname:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /run/systemd:/run/systemd:ro
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
      - /mnt/storage:/mnt/storage:ro
    environment:
      VULTURE_DB_PATH: /app/data/vulture.db
      VULTURE_LOG_PATH: /app/logs/vulture.log
      NEST_STATUS_PATH: /app/data/kestrel_nest_status.json
      NEST_ERROR_PATH: /app/data/kestrel_nest_error.json
      NEST_HISTORY_PATH: /app/data/kestrel_nest_history.jsonl
      DASHBOARD_HOST_ROOT: /host/root
      DASHBOARD_HOST_PROC: /host/proc
      DASHBOARD_SYSTEMD_BUS_SOCKET: /run/dbus/system_bus_socket
      DASHBOARD_GLANCES_URL: http://glances:61208
      DASHBOARD_USE_GLANCES: "true"
      DASHBOARD_GLANCES_HISTORY_INTERVAL_SECONDS: "10"
    networks:
      - dashboard-internal
    restart: unless-stopped

networks:
  dashboard-internal:
    driver: bridge
