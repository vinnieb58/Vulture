# Vulture Dashboard v0.1 — read-only observability container for Raven.
# Does not run the Vulture bot or scheduler; mounts host data/logs read-only.

services:
  vulture-dashboard:
    build:
      context: ./dashboard
    ports:
      - "8088:8088"
    volumes:
      - ./data:/app/data:ro
      - ./logs:/app/logs:ro
    environment:
      VULTURE_DB_PATH: /app/data/vulture.db
      VULTURE_LOG_PATH: /app/logs/vulture.log
    restart: unless-stopped
